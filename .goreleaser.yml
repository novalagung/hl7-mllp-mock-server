version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: mllpong
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

upx:
  - enabled: true
    compress: best
    goos:
      - linux

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

nfpms:
  - package_name: mllpong
    homepage: https://mllpong.novalagung.com
    maintainer: Noval Agung Prayogo <caknopal@gmail.com>
    description: An open-source lightweight mock server for testing HL7 v2 messages over MLLP — always-ACK, always-NACK, and rule-based smart handler
    license: MIT
    formats:
      - deb
      - rpm
      - apk

homebrew_casks:
  - name: mllpong
    homepage: https://mllpong.novalagung.com
    description: An open-source lightweight mock server for testing HL7 v2 messages over MLLP — always-ACK, always-NACK, and rule-based smart handler
    license: MIT
    url:
      verified: github.com/novalagung/mllpong
    repository:
      owner: novalagung
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/mllpong"]
          end

release:
  github:
    owner: novalagung
    name: mllpong
