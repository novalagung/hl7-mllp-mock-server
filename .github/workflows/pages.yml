name: GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - README.md
      - docs/_config.yml
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build index page from README
        run: printf -- '---\nlayout: default\ntitle: HL7 MLLP Mock Server\n---\n\n' | cat - README.md > docs/index.md

      - uses: actions/configure-pages@v4

      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
